<!DOCTYPE html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Resume - Md. Marop Hossain</title>
    <link rel="stylesheet" href="assets/css/style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <link rel="icon" type="image/x-icon" href="assets/favicon/favicon.ico" />
    <style>
      /* Basic style for the resume viewer container */
      .resume-viewer {
        margin-top: 2rem;
        margin-bottom: 2rem;
        width: 100%;
        max-width: 1000px; /* Max-width for larger screens */
        height: 1000px; /* Height of the PDF viewer */
        margin-left: auto;
        margin-right: auto;
        border: 1px solid rgba(128, 128, 128, 0.3); /* Subtle border */
        box-shadow: var(--card-shadow);
      }
      .resume-viewer object {
        width: 100%;
        height: 100%;
      }
      .resume-section p {
        text-align: center;
        font-size: 1.1rem;
        color: var(--text-secondary);
      }
      .resume-section .resume-button {
        display: block;
        width: fit-content;
        margin: 0 auto;
      }
    </style>
  </head>
  <body>
    <nav class="nav">
      <div class="nav-content">
        <div class="logo">MMH</div>
        <button id="mobile-menu-toggle" class="mobile-menu-toggle">
          <i class="fas fa-bars"></i>
        </button>
        <div class="nav-links-container">
          <a href="index.html"><i class="fa fa-home"></i> Home</a>
          <a href="education.html"
            ><i class="fa fa-graduation-cap"></i> Education</a
          >
          <a href="experience.html"
            ><i class="fa fa-briefcase"></i> Experience</a
          >
          <a href="projects.html"><i class="fa fa-code-branch"></i> Projects</a>
          <a href="resume.html" class="active"
            ><i class="fa fa-file-alt"></i> Resume</a
          >
          <a href="contact.html"><i class="fa fa-envelope"></i> Contact</a>
        </div>
      </div>
    </nav>

    <section class="section resume-section">
      <h2><i class="fa fa-file-alt"></i> Resume</h2>
      <p>View my resume below or download a copy.</p>

      <div class="resume-viewer">
        <object
          data="assets/md_marop_hossain_resume.pdf"
          type="application/pdf"
        >
          <p>
            Your browser does not support embedded PDFs. You can
            <a href="assets/md_marop_hossain_resume.pdf" target="_blank"
              >download the resume here</a
            >
            instead.
          </p>
        </object>
      </div>

      <a
        class="resume-button"
        href="assets/md_marop_hossain_resume.pdf"
        target="_blank"
        >Download Resume (PDF)</a
      >
    </section>

    <footer>
      <p>© 2025 Md. Marop Hossain. All rights reserved.</p>
    </footer>
    <script src="assets/js/main.js"></script>
  </body>
</html>
